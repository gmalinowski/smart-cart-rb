services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: smartcart
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rails:
    build:
      context: .
      dockerfile: Containerfile.dev
    container_name: smartcart_rails
    ports:
      - "3000:3000"
      - "3036:3036"
      - "3037:3037"
    command: bash
    tty: true
    working_dir: /app
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
      - node_modules_cache:/app/node_modules
    depends_on:
      - db

volumes:
  postgres_data:
  bundle_cache:
  node_modules_cache: