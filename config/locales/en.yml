# Files in the config/locales directory are used for internationalization and
# are automatically loaded by Rails. If you want to use locales other than
# English, add the necessary files in this directory.
#
# To use the locales, use `I18n.t`:
#
#     I18n.t "hello"
#
# In views, this is aliased to just `t`:
#
#     <%= t("hello") %>
#
# To use a different locale, set it with `I18n.locale`:
#
#     I18n.locale = :es
#
# This would use the information in config/locales/es.yml.
#
# To learn more about the API, please read the Rails Internationalization guide
# at https://guides.rubyonrails.org/i18n.html.
#
# Be aware that YAML interprets the following case-insensitive strings as
# booleans: `true`, `false`, `on`, `off`, `yes`, `no`. Therefore, these strings
# must be quoted to be interpreted as strings. For example:
#
#     en:
#       "yes": yup
#       enabled: "ON"

en:
  app_name: "Shopping List Live"
  helpers:
    submit:
      friendship_invitation:
        create: "Send invitation"
        update: "Update invitation"
  activemodel:
    attributes:
      friendship_invitation:
        email: "Friend's email"
  activerecord:
    models:
      invitation_link: "Invitation"
    attributes:
      invitation_link:
        recipient_email: "Recipient email"
    errors:
      models:
        invitation_link:
          attributes:
            recipient_email:
              blank: "cannot be empty"
              invalid: "is not a valid email address"
              taken: "has already received an invitation"
            max_uses:
              inclusion: "must be 1 for email invitations"
              equal_to: "must be 1 for email invitations"
  errors:
    messages:
      not_found: "Sorry, we couldn't find what you were looking for"
  pundit:
    user_not_authorized: "You are not authorized to perform this action"
  friendships:
    new:
      title: "Send friend request"
    create:
      error: "Something went wrong with the friendship"
      success: "Friend request sent"
      already_exists: "Friendship already exists"
    destroy:
      error: "Something went wrong with the deletion"
      success: "You are no longer friends"
      request:
        error: "Something went wrong with the deletion"
        success: "Friend request canceled"
    actions:
      send_request: "Send friend request"
      accept: "Accept friend request"
      reject: "Decline Request"
      cancel: "Cancel"
      remove_friend?: "Remove friend"
    confirm:
      error: "Something went wrong with the confirmation"
      success: "You are now friends!"
      already_accepted: "Friendship already accepted"
      forbidden: "Friendship forbidden"
  invitation_links:
    create:
      error: "Error creating invitation link"
      already_exists: "Invitation link already exists"
  mailer:
    footer_note: "This is an automated message. Please do not reply."
    greeting: "Hello!"
  friendship_mailer:
    invitation_email:
      subject: "New friendship invitation on Shopping List Live"
      body: "User <b>%{sender}</b> has just sent you a friendship invitation."
      cta_button: "View Invitation"
  invitation_mailer:
    friend_invitation_to_signup:
      subject: "You have been invited to join Shopping List Live"
      body: "You have been invited to join Shopping List Live by <b>%{sender}</b>.<br>Sign up and accept the invitation to see your friend's shopping list."
      cta_button: "Sign up to see your friend's shopping list"